name: Update Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"   # প্রতিদিন রাত ১২টায় চলবে
  workflow_dispatch:        # ম্যানুয়ালি রান করা যাবে
  push:
    paths:
      - "generate_stats.py"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate SVG
        run: python generate_stats.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --cached --quiet || git commit -m "chore: update stats.svg [skip ci]"
          git push
